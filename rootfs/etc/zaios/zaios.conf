# ZAIos main config — read by zaios-init at boot and by zaios-shell
# at startup. These are boot-time defaults; runtime settings are in
# /var/lib/zaios/settings.ini (managed by SettingsManager).

# Boot mode:
#   live   — running from squashfs (live ISO)
#   disk   — installed to disk
[boot]
mode=live
arch=x86_64
installer=0

# Init debug logging — set to 1 for verbose boot
[debug]
verbose=0
serial=1

# Services to start (comma-separated). Each must have a config file
# in /etc/zaios/services.d/
[services]
start=dbus,networkmanager,bluetooth,pipewire,wireplumber,cast-manager,zaios-input,zaios-spotify

# Compositor (Cage) settings
[compositor]
backend=drm
device=/dev/dri/card0
fullscreen=1

# Default user for the shell
[user]
name=zaios
uid=1000
gid=1000
home=/home/zaios
