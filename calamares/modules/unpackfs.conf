# Calamares unpackfs module config — copies the live rootfs to /target
---
# Source: the squashfs we shipped in the ISO (already loop-mounted by initramfs)
source:
    - source: "/run/zaios/rootfs"
      sourcefs: "squashfs"
      destination: "/"

# Don't try to copy these (kernel mounts)
ignore:
    - /proc
    - /sys
    - /dev
    - /run
    - /tmp
    - /var/cache
    - /var/log

# Verify checksums
verify: true

# Weight (parallelism hint)
weight: 1
