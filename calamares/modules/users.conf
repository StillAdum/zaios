# Calamares users module config — create the user account on the installed system
---
# Default user
defaultGroups:
    - zaios
    - audio
    - video
    - input
    - render
    - plugdev
    - netdev
    - bluetooth
    - wheel

# Allow autologin for the zaios user (TV OS — single user, no password)
doAutologin: true

# Don't set a password by default — TV OSes don't typically need one
setRootPassword: false
doReusePassword: false

# Allow empty passwords (TV use case)
allowWeakPasswords: true
allowWeakPasswordsDefault: true

# User field
userShell: /bin/sh

# Hostname
hostname: zaios
writeHostsFile: true
