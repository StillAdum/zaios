# Calamares bootloader module config — install GRUB to the target disk
---
# EFI
efiBootLoader: "grub"

# BIOS
bootLoaderType: "grub"

# Where to install GRUB (set by partition module on the selected disk)
installBootloader: true

# GRUB configuration
kernelParams: "quiet loglevel=3 zaios.installed=1"
timeout: "5"

# Set the kernel/initramfs names
kernel: "/boot/vmlinuz"
initramfs: "/boot/initramfs.img"

# Default GRUB entry
default: "0"
