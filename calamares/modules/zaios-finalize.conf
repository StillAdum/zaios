# ZAIos finalize module — custom Calamares module (Python) that does
# ZAIos-specific post-install setup:
#   - Writes /etc/zaios/installed
#   - Sets boot=installed in zaios.conf
#   - Installs GRUB config that boots from disk (not from ISO)
#   - Copies the saved WiFi networks from the live session

---
# Marker file to write
marker: "/etc/zaios/installed"

# Update zaios.conf
configUpdate:
    boot.mode: "disk"
    boot.installer: "0"
    boot.installed: "1"

# Copy these paths from the live system to the installed system
preserveFromLive:
    - "/var/lib/zaios/settings.ini"
    - "/etc/wpa_supplicant/wpa_supplicant.conf"
    - "/var/lib/NetworkManager/"
    - "/var/lib/bluetooth/"
