# Calamares partition module config
---
# Use the new partitioning interface
userSwapChoices:
    - none      # No swap partition
    - small     # Small (4 GB)
    - suspend   # Suspend-to-disk (RAM size)
    - file      # Swap file (recommended)

# Always show the manual partitioning option
alwaysShowPartitionLabels: true

# Default filesystem
defaultFileSystemType: "ext4"

# Available filesystem types
availableFileSystemTypes:
    - ext4
    - btrfs
    - xfs
    - f2fs

# Allow installing to USB drives
allowManualPartitioning: true

# Required partitions (boot, root)
requiredPartitions:
    - mount: /
      fs: ext4
      minSize: 8GiB
    - mount: /boot
      fs: vfat
      minSize: 512MiB
      flags: [boot, esp]

# LUKS support (encrypted root)
enableLuks: true

# Don't try to install to the live media itself
ignoreDisk: ["/dev/loop0", "/dev/loop1", "/dev/loop2", "/dev/sr0"]
