# Calamares services-systemd module config — enable/disable services on the
# installed system. We use systemd-style service names but our init system
# (zaios-init) just looks for executables in /usr/lib/zaios/ — the
# "enable" list is a hint to zaios-finalize.
---
disable: []
enable:
    - dbus
    - networkmanager
    - bluetooth
    - pipewire
    - wireplumber
    - cast-manager
    - zaios-input
    - zaios-spotify
mask: []
